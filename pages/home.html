<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css_components/home/global.css">
    <link rel="stylesheet" href="/css_components/home/navbar.css">
    <link rel="stylesheet" href="/css_components/home/hero.css">
    <link rel="stylesheet" href="/css_components/home/card.css">
    <link rel="stylesheet" href="/css_components/home/grid.css">
    <link rel="stylesheet" href="/css_components/home/banner.css">
    <link rel="stylesheet" href="/css_components/home/footer.css">
    <link rel="stylesheet" href="/css_components/home/cart.css">
    <link href="https://fonts.googleapis.com/css2?family=League+Gothic&display=swap" rel="stylesheet">
    <title>Overload - Home</title>
</head>

<body class="layout">
    <header class="header">
        <nav class="navbar">
            <label class="nav-menu">☰</label>
            <div class="nav-links-wrapper">
                <ul>
                    <li>
                        <a>Home</a>
                    </li>
                    <li>
                        <a>Gallery</a>
                    </li>
                    <li>
                        <a>Merchandise</a>
                    </li>
                    <li>
                        <a>About</a>
                    </li>
                </ul>
            </div>

            <div class="nav-logo-wrapper">
                <h1 class="nav-logo">OVERLOAD</h1>
            </div>

            <div class="nav-icons-wrapper">
                <img src="/assets/icons/login_icon.svg">
                <div class="cart-icon">
                    <img src="/assets/icons/cart_icon.svg">
                    <span class="cart-badge">1</span>
                </div>
            </div>
        </nav>

        <aside>
            <div class="cart-wrapper">
                <div class="cart-container">
                    <div class="cart-header">
                        <label class="cart-item-count">
                            You currently have 1 item on your cart.
                        </label>
                        <img src="/assets/icons/close_cart_icon.svg">
                    </div>

                    <div class="cart-items-container">
                        <div class="cart-item-header">
                            <img src="/assets/icons/remove_cart_item_icon.svg">
                        </div>
                        <div class="cart-item-image">
                            <img src="/assets/images/opx_tshirt.png">
                        </div>
                        <div class="cart-item-info-and-quantity">
                            <label>October Praise X T-Shirt</label>
                            <label>Black</label>
                            <label>Small</label>
                            <div class="cart-item-quantity">
                                <button class="cart-item-decrement">
                                    <img src="/assets/icons/decrement_icon.svg">
                                </button>
                                <input class="item-quantity no-spinner" type="number" value="1">
                                <button class="cart-item-increment">
                                    <img src="/assets//icons/increment_icon.svg">
                                </button>
                            </div>
                        </div>
                        <div class="cart-item-price">
                            <label>$10</label>
                        </div>
                    </div>
                </div>
            </div>
        </aside>
    </header>



    <main class="main">
        <section>
            <div class="hero">
                <h1>OVERLOAD</h1>
            </div>
        </section>
        <section>
            <div class="cards-wrapper">
                <div class="card-header">
                    <label>New Merchandise</label>
                </div>

                <button class="card-scroll-button left"></button>
                <button class="card-scroll-button right"></button>

                <div class="cards-scrollable-container">
                    <div class="card">
                        <img src="/assets/images/opx_tshirt.png">
                        <div class="card-name-and-price-wrapper">
                            <label>OPX T-Shirt</label>
                            <label>$10</label>
                        </div>
                        <div class="card-color-description-wrapper">
                            <label>Black</label>
                        </div>
                    </div>
                    <div class="card">
                        <img src="/assets/images/opx_tshirt.png">
                        <div class="card-name-and-price-wrapper">
                            <label>OPX T-Shirt</label>
                            <label>$10</label>
                        </div>
                        <div class="card-color-description-wrapper">
                            <label>Black</label>
                        </div>
                    </div>
                </div>
        </section>

        <div class="line"></div>

        <section>
            <div class="grid-wrapper">
                <label>OPX T-Shirt</label>
                <p>
                    Limited Edition "OCTOBER PRAISE 10TH-ANNIVERSARY" Commemorative T-Shirts are now available!
                </p>
                <div class="grid-container">
                    <div class="grid-box">
                        <img src="/assets/images/480268231_618995570731114_6390277328152135975_n.jpg">
                    </div>
                    <div class="grid-box">
                        <img src="/assets/images/480393280_618995684064436_7936841905116124203_n.jpg">
                    </div>
                    <div class="grid-box">
                        <img src="/assets//images/480695223_618995650731106_7751437919656678160_n.jpg">
                    </div>
                    <div class="grid-box">
                        <img src="/assets/images/480553015_618995620731109_8323244016010750911_n.jpg">
                    </div>
                </div>
                <div class="grid-container mobile">
                    <div class="grid-box">
                        <img src="/assets/images/480268231_618995570731114_6390277328152135975_n.jpg">
                    </div>
                    <div class="grid-box">
                        <img src="/assets//images/480695223_618995650731106_7751437919656678160_n.jpg">
                    </div>
                </div>
                <button>View Merchandise</button>
            </div>
        </section>
        <section>
            <div class="banner-wrapper">
                <img src="/assets/images/overload_banner.png">
            </div>
            <div class="banner-wrapper mobile-banner">
                <img src="/assets/images/overload_banner_mobile.jpg">
            </div>
        </section>

        <section>
            <div class="cards-grid-wrapper">
                <div class="card-header">
                    <label>More Merchandise</label>
                </div>
                <div class="cards-grid-container">
                    <div class="card mobile-card">
                        <img src="/assets/images/opx_tshirt.png">
                        <div class="card-name-and-price-wrapper">
                            <label>OPX T-Shirt</label>
                            <label>$10</label>
                        </div>
                        <div class="card-color-description-wrapper">
                            <label>Black</label>
                        </div>
                    </div>
                    <div class="card mobile-card">
                        <img src="/assets/images/opx_tshirt.png">
                        <div class="card-name-and-price-wrapper">
                            <label>OPX T-Shirt</label>
                            <label>$10</label>
                        </div>
                        <div class="card-color-description-wrapper">
                            <label>Black</label>
                        </div>
                    </div>
                    <div class="card mobile-card">
                        <img src="/assets/images/opx_tshirt.png">
                        <div class="card-name-and-price-wrapper">
                            <label>OPX T-Shirt</label>
                            <label>$10</label>
                        </div>
                        <div class="card-color-description-wrapper">
                            <label>Black</label>
                        </div>
                    </div>
                </div>
        </section>

    <footer>
        <div class="footer-wrapper">
            <div class="footer-box-row-one">
                <a href="https://www.facebook.com/BancalFirstUMC" target="_blank">
                    First United Methodist Church, Bancal, Guagua, Pampanga.
                </a>
                <label>© 2025 Overload Gig. All Rights Reserved.</label>
            </div>
            <div class="footer-box-row-two">
                <a href="https://www.facebook.com/overload.gig" target="_blank">
                    <img src="/assets/icons/fb_icon.svg">
                </a>
                <a href="https://www.instagram.com/overloadyouthmerch" target="_blank">
                    <img src="/assets//icons/ig_icon.svg">
                </a>
                <a href="https://www.youtube.com/@lifelink7395" target="_blank">
                    <img src="/assets/icons/yt_icon.svg">
                </a>
            </div>
        </div>
        <div></div>
    </footer>

</html>
